version: "3.9"

services:
  mongodb:
    image: mongo:7
    container_name: chat_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  server:
    build: ./server
    container_name: chat_server
    restart: unless-stopped
    ports:
      - "5001:5001"
    env_file:
      - ./server/.env
    environment:
      - MONGO_URI=mongodb://mongodb:27017/chat_platform
    depends_on:
      - mongodb
    volumes:
      - ./server:/app
      - /app/node_modules
      - uploads_data:/app/uploads

  client:
    build: ./client
    container_name: chat_client
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on:
      - server
    env_file:
      - ./client/.env
    volumes:
      - ./client:/app
      - /app/node_modules

volumes:
  mongo_data:
  uploads_data:

